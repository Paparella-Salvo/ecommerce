<h2>Ricerca Catalogo
    <button matButton="filled" mat-icon-button  aria-hidden="false" (click)="navigateTo()">
    <mat-icon fontIcon="warehouse"></mat-icon>
  </button>
</h2>
<div>
    <form class="example-form">
    <mat-form-field class="example-full-width">
        <mat-label>Ricerca catalogo</mat-label>
        <input matInput placeholder="Prodotto" value="{{prodotto.nome}}" (input)="onInput($event)">
    </mat-form-field>
    <button matButton="filled" class="example-button-row" (click)="ricerca($event)">Invia</button>
    @if (bool == true) {
        <p>
            {{ricercaCatalogo()}}
            @if(trovato == true){
                <mat-checkbox class="example-margin" (change)="update($event.checked)"></mat-checkbox>
            }
        </p>
    }
    </form>
</div>
<app-pagina2></app-pagina2>
