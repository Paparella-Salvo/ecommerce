<h2>Magazzino
 <button matButton="filled" mat-icon-button  aria-hidden="false" (click)="navigateTo()">
    <mat-icon fontIcon="home"></mat-icon>
  </button>
</h2>
<form [formGroup]="homeform" (ngSubmit)="aggiungiMagazzino(prodotto)"> 
 <mat-form-field>
  <mat-label>Nome</mat-label>
  <input matInput name="nome" placeholder="Prodotto"  formControlName="nome"> 
 </mat-form-field>
 <mat-form-field>
  <mat-label>Pezzi</mat-label>
  <input matInput name="pezzi" type="number" placeholder="0" formControlName="pezzi"> 
 </mat-form-field>
  <button matButton="filled" type="submit" [disabled]="!homeform.valid">Invio</button> 
</form>

<h2>Prodotti in magazzino</h2>
@for (prodotto of catalogo; track prodotto) {
  <p>{{prodotto.nome}} {{prodotto.pezzi}}</p>
}
